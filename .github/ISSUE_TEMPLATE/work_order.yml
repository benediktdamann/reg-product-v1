name: Work Order
description: Structured implementation request for Cursor
title: "[Work Order] "
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: Describe the target outcome.
      placeholder: What should be implemented?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Define what is included in implementation.
      placeholder: What files/components/areas are in scope?
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Define the checks that confirm completion.
      placeholder: What must be true for this to be done?
    validations:
      required: true

  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Notes
      description: Optional implementation notes or constraints.
      placeholder: Any technical details to help implementation.
    validations:
      required: false

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: Optional list of excluded work.
      placeholder: What should explicitly not be changed?
    validations:
      required: false
